apiVersion: apps/v1
kind: Deployment
metadata:
  name: orra-api-gateway
  labels:
    app: orra-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orra-api-gateway
  template:
    metadata:
      labels:
        app: orra-api-gateway
    spec:
      containers:
      - name: api-gateway
        image: orra/api-gateway:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: orra-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: orra-api-gateway
spec:
  selector:
    app: orra-api-gateway
  ports:
  - port: 80
    targetPort: 3000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orra-voice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orra-voice
  template:
    metadata:
      labels:
        app: orra-voice
    spec:
      containers:
      - name: voice
        image: orra/voice:latest
        ports:
        - containerPort: 3001
        envFrom:
        - secretRef:
            name: orra-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: orra-voice
spec:
  selector:
    app: orra-voice
  ports:
  - port: 3001
    targetPort: 3001
  type: LoadBalancer
