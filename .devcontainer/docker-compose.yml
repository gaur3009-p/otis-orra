version: "3.9"

services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:20
    volumes:
      - ../:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orra
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://localhost:11434
      JWT_SECRET: dev-secret-change-in-prod
    depends_on:
      - postgres
      - redis
    network_mode: service:postgres   # share network so localhost works

  postgres:
    image: pgvector/pgvector:pg16    # includes pgvector extension built-in
    restart: unless-stopped
    environment:
      POSTGRES_DB: orra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
